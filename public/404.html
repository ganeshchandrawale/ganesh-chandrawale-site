<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect for Next.js static export
    var path = window.location.pathname;
    var search = window.location.search;
    
    // Redirect to homepage with path parameter
    window.location.replace('/?' + 
      (search ? search.substring(1) + '&' : '') + 
      'p=' + encodeURIComponent(path)
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
